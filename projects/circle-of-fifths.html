<body>
  <div class="menu" id="menu-container">
    <!-- Menu will be loaded by JavaScript -->
  </div>
  <main>
    <section>
      <div>
        <h1>Circle of Fifths Oscillator</h1>
      </div>
      <div class="content">
        <p>A beam bounces around the circle of fifths at a fixed angle. The angle determines which musical interval it traces and how many notes it visits before returning to the start.</p>
      </div>
    </section>

    <section class="cof-app">
      <div class="cof-canvas-wrap">
        <canvas id="cofCanvas" width="500" height="500"></canvas>
      </div>

      <div class="cof-controls">
        <div class="control-row">
          <span class="control-label">Interval</span>
          <div class="slider-ticks" id="stepSliderWrap">
            <input type="range" id="stepSlider" min="1" max="11" value="7" step="1">
          </div>
          <span class="control-value" id="intervalDisplay">Perfect 5th</span>
        </div>

        <div class="control-row">
          <span class="control-label">Tempo</span>
          <input type="range" id="tempoSlider" min="40" max="300" value="140">
          <span class="control-value" id="tempoDisplay">140 bpm</span>
        </div>

        <div class="control-row">
          <span class="control-label">Start note</span>
          <select id="startNoteSelect"></select>
        </div>

        <div class="cof-info-row">
          <span class="info-item">Bounce angle <strong id="angleDisplay">105°</strong></span>
          <span class="info-item">Notes visited <strong id="notesCountDisplay">12</strong></span>
          <span class="info-item">Pattern <strong id="patternDisplay">—</strong></span>
        </div>

        <div class="cof-buttons">
          <button class="btn-primary" id="playBtn">Play</button>
          <button class="btn-secondary" id="resetBtn">Reset</button>
        </div>
      </div>

      <div class="cof-sequence" id="sequenceDisplay"></div>
    </section>
  </main>
</body>
