<body>
  <div class="menu" id="menu-container">
    <!-- Menu will be loaded by JavaScript -->
  </div>
  <main>
    <section>
      <div>
        <h1>Chord Detector</h1>
      </div>
      <div class="content">
        <p>A browser-based tool that listens to a guitar through the microphone and displays, in real time, every note currently sounding along with a best-guess chord name.</p>
      </div>
    </section>

    <section class="cd-app">

      <!-- Header -->
      <div class="section-meta">
        <span class="section-index">Chord Detector</span>
        <span class="section-duration" id="status-text">tap start to begin</span>
      </div>

      <!-- Chord display -->
      <div class="chord-block">
        <div class="chord-name" id="chord-name">---</div>
        <div class="chord-subtitle" id="chord-subtitle">play a chord</div>
      </div>

      <!-- Input level -->
      <div class="input-level-wrap">
        <div class="input-level" id="input-level"></div>
      </div>

      <!-- Note grid: 12 pitch classes -->
      <div class="note-grid" id="note-grid"></div>

      <!-- Start / stop -->
      <div class="controls">
        <button class="btn-primary" id="start-btn">START</button>
      </div>

      <!-- Settings -->
      <div class="slider-panel">
        <div class="slider-group">
          <span class="slider-label">Input Device</span>
          <select class="device-select" id="device-select">
            <option value="">Default mic</option>
          </select>
        </div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">Sensitivity</span>
            <span class="slider-value" id="sensitivity-value">0.40</span>
          </div>
          <input type="range" id="sensitivity" min="0.1" max="0.9" step="0.05" value="0.4">
        </div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">Smoothing</span>
            <span class="slider-value" id="smoothing-value">0.80</span>
          </div>
          <input type="range" id="smoothing" min="0" max="0.95" step="0.05" value="0.8">
        </div>
      </div>

    </section>
  </main>
</body>
